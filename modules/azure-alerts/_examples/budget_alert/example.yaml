# Example: Configure a Budget Alert (YAML representation)

values:
  common:
    location: eastus
    resource_group_name: example-alerts-rg
    tags:
      environment: production
      project: azure-alerts

  action_group:
    name: budget-alert-action-group
    resource_group_name: example-alerts-rg
    short_name: BudgetAG

    email_receivers:
      finance_team:
        name: Finance Team
        email_address: finance@example.com
      ops_team:
        name: Operations Team
        email_address: ops@example.com

  budget:
    name: monthly-subscription-budget
    subscription_id: /subscriptions/00000000-0000-0000-0000-000000000000
    amount: 5000
    time_grain: Monthly
    time_period:
      start_date: "2026-01-01"
      end_date: "2027-12-31"
    notification:
      - enabled: true
        operator: GreaterThan
        threshold: 75
        threshold_type: Actual
        contact_emails:
          - finance@example.com
      - enabled: true
        operator: GreaterThan
        threshold: 100
        threshold_type: Actual
        contact_emails:
          - finance@example.com
