# Example: Configure Activity Log Alerts (YAML representation)

values:
  common:
    location: global
    resource_group_name: example-alerts-rg
    tags:
      environment: production
      project: azure-alerts

  action_group:
    name: activity-log-action-group
    resource_group_name: example-alerts-rg
    short_name: ActivityAG

    email_receivers:
      security_team:
        name: Security Team
        email_address: security@example.com
      ops_team:
        name: Operations Team
        email_address: ops@example.com

  log_alert:
    - name: vm-delete-alert
      description: Alert when VMs are deleted
      enabled: true
      scopes:
        - /subscriptions/00000000-0000-0000-0000-000000000000

      criteria:
        category: Administrative
        resource_types:
          - Microsoft.Compute/virtualMachines
        statuses:
          - Succeeded

      action: {}

    - name: security-policy-change-alert
      description: Alert when security policies are created or updated
      enabled: true
      scopes:
        - /subscriptions/00000000-0000-0000-0000-000000000000

      criteria:
        category: Administrative
        resource_providers:
          - Microsoft.Security
        statuses:
          - Succeeded

      action: {}

    - name: service-health-alert
      description: Alert on Azure service health incidents
      enabled: true
      scopes:
        - /subscriptions/00000000-0000-0000-0000-000000000000

      criteria:
        category: ServiceHealth
        service_health:
          events:
            - Incident
            - Maintenance
            - Informational
          locations:
            - Global
          services:
            - All

      action: {}
