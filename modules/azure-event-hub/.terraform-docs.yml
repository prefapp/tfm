# settings.lockfile: true (aligned with other tfm modules): the README "Requirements" section shows provider
# constraints from versions.tf; the "Providers" section shows the resolved versions from .terraform.lock.hcl
# at the time `terraform-docs` was run (not an extra minimum requirement).
# Resource links in the README may still show registry .../latest; replace with pinned versions after generate if desired.
formatter: "markdown"

version: ""

header-from: docs/header.md
footer-from: docs/footer.md

recursive:
  enabled: false
  path: modules
  include-main: true

sections:
  hide: []
  show: []

content: ""

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
