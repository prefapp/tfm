# Reference only — replace subscription IDs, resource groups, and names.
values:
  tags_from_rg: true
  tags:
    extra_tag: "example"
  namespace:
    name: "example-namespace"
    location: "westeurope"
    resource_group_name: "example-resource-group"
    sku: "Standard"
    capacity: 1
    auto_inflate_enabled: false
    identity_type: "SystemAssigned"
    ruleset:
      default_action: "Deny"
      public_network_access_enabled: true
      trusted_service_access_enabled: true
      ip_rules:
        - ip_mask: "10.0.0.1"
          action: "Allow"
        - ip_mask: "10.0.0.2"
          action: "Allow"
      virtual_network_rules: []
  system_topic:
    topic-events:
      name: "topic-events"
      location: "global"
      topic_type: "Microsoft.Resources.Subscriptions"
      source_resource_id: "/subscriptions/00000000-0000-0000-0000-000000000000"
  eventhub:
    events-hub:
      name: "events-hub"
      partition_count: 1
      message_retention: 1
      consumer_group_names:
        - "events-subscription"
        - "external-processor"
      auth_rules:
        - name: "external-listen"
          listen: true
          send: false
          manage: false
      event_subscription:
        name: "events-subscription"
        included_event_types:
          - "Microsoft.Resources.ResourceWriteSuccess"
          - "Microsoft.Resources.ResourceWriteFailure"
        retry_ttl: 1440
        max_attempts: 30
      system_topic_name: "topic-events"
    logs-hub:
      name: "logs-hub"
      partition_count: 1
      message_retention: 1
      consumer_group_names:
        - "app-logs"
        - "infra-logs"
      auth_rules:
        - name: "app-fluentbit-agent"
          listen: false
          send: true
          manage: false
