name: example-mi
resource_group: example-rg
location: westeurope

tags_from_rg: false
tags:
  env: dev

rbac:
  - name: sub-reader
    scope: /subscriptions/00000000-0000-0000-0000-000000000000
    roles:
      - Reader
  - name: rg-contributor
    scope: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/example-rg
    roles:
      - Contributor
      - Reader

federated_credentials:
  - name: github-oidc
    type: github
    organization: my-org
    repository: my-repo
    entity: environment:production
  - name: k8s-workload
    type: kubernetes
    issuer: https://kubernetes.default.svc.cluster.local
    namespace: default
    service_account_name: workload-sa
  - name: custom
    type: other
    issuer: https://example.com
    subject: custom-subject

audience:
  - api://AzureADTokenExchange

access_policies:
  - key_vault_id: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/example-rg/providers/Microsoft.KeyVault/vaults/example-kv
    secret_permissions:
      - Get
      - List
    key_permissions: []
    certificate_permissions: []
    storage_permissions: []
