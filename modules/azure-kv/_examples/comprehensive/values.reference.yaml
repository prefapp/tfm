# Illustrative inputs for azure-kv.
#
# RBAC mode: set enable_rbac_authorization: true and access_policies: [].
# Access-policy mode (this file): enable_rbac_authorization: false and define access_policies.

name: examplekv001
resource_group: example-rg
sku_name: standard
enabled_for_disk_encryption: true
soft_delete_retention_days: 7
purge_protection_enabled: false
enable_rbac_authorization: false

tags_from_rg: true
tags:
  cost_center: "1234"

access_policies:
  - name: direct-object-id
    object_id: 00000000-0000-0000-0000-000000000000
    key_permissions: [Get, List]
    secret_permissions: [Get, List]
    certificate_permissions: []
    storage_permissions: []
  - name: Contoso-Admins
    type: group
    object_id: ""
    key_permissions: [Get, List]
    secret_permissions: [Get, List]
    certificate_permissions: []
    storage_permissions: []
