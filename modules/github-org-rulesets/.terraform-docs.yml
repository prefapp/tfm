formatter: "markdown" # this is required

version: ""

header-from: docs/header.md
footer-from: docs/footer.md

recursive:
  enabled: false
  path: modules
  include-main: true

sections:
  hide: []
  show: []

content: |-
  {{ .Header }}

  {{ .Requirements }}

  ## Providers

  This wrapper module does not expose any direct provider entries in terraform-docs, but it **does require** the [`integrations/github`](https://registry.terraform.io/providers/integrations/github/latest) provider because it calls the nested [`github-org-ruleset`](../github-org-ruleset) module. Consumers of this module must configure the GitHub provider, using version `~> 6.0` as shown in the [Requirements](#requirements) section above.

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

  {{ .Footer }}

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
