# Illustrative values for wrappers / pipelines (replace all placeholders).
values:
  resource_group: "example-rg"
  tags_from_rg: false
  tags:
    example: "basic"
  password_length: 20
  key_vault:
    name: "example-kv"
    resource_group_name: "example-rg"
  vnet:
    name: "example-vnet"
    resource_group_name: "example-rg"
  subnet_name: null
  dns_private_zone_name: null
  administrator_password_key_vault_secret_name: "pg-admin-password"
  postgresql_flexible_server:
    name: "example-pg-basic"
    location: "westeurope"
    version: 15
    public_network_access_enabled: true
    administrator_login: "psqladmin"
    storage_mb: 65536
    sku_name: "GP_Standard_D2ds_v5"
    backup_retention_days: 30
    maintenance_window:
      day_of_week: 6
      start_hour: 0
      start_minute: 0
    authentication:
      active_directory_auth_enabled: false
      password_auth_enabled: true
  postgresql_flexible_server_configuration: {}
  firewall_rule:
    - name: "allow-single-ip"
      start_ip_address: "203.0.113.10"
      end_ip_address: "203.0.113.10"
